# Traffic Shaper (dummynet) pipes, queues, and rules. Core module.
package: trafficshaper
resources:
  - name: pipe
    go_type: Pipe
    type_name: trafficshaper_pipe
    title: a traffic shaper pipe
    kind: item
    reconfigure: /api/trafficshaper/service/reconfigure
    monad: pipe
    endpoints:
      add: /api/trafficshaper/settings/add_pipe
      get: /api/trafficshaper/settings/get_pipe
      set: /api/trafficshaper/settings/set_pipe
      del: /api/trafficshaper/settings/del_pipe
      search: /api/trafficshaper/settings/search_pipe
    fields:
      - {name: Enabled, tf: enabled, json: enabled, type: bool, default: "true", desc: "Whether this pipe is enabled."}
      - {name: Number, tf: number, json: number, type: int, required: true, desc: "Pipe number (unique)."}
      - {name: Bandwidth, tf: bandwidth, json: bandwidth, type: int, required: true, desc: "Bandwidth value."}
      - {name: BandwidthMetric, tf: bandwidth_metric, json: bandwidthMetric, type: selectmap, required: true, desc: "Bandwidth unit (e.g. Mbit/s)."}
      - {name: Mask, tf: mask, json: mask, type: selectmap, default: "none", desc: "Dynamic pipe mask: none, src-ip, dst-ip."}
      - {name: Scheduler, tf: scheduler, json: scheduler, type: selectmap, default: "", desc: "Scheduler type (e.g. fq_codel)."}
      - {name: Description, tf: description, json: description, type: string, default: "", desc: "Description."}

  - name: queue
    go_type: Queue
    type_name: trafficshaper_queue
    title: a traffic shaper queue
    kind: item
    reconfigure: /api/trafficshaper/service/reconfigure
    monad: queue
    endpoints:
      add: /api/trafficshaper/settings/add_queue
      get: /api/trafficshaper/settings/get_queue
      set: /api/trafficshaper/settings/set_queue
      del: /api/trafficshaper/settings/del_queue
      search: /api/trafficshaper/settings/search_queue
    fields:
      - {name: Enabled, tf: enabled, json: enabled, type: bool, default: "true", desc: "Whether this queue is enabled."}
      - {name: Number, tf: number, json: number, type: int, required: true, desc: "Queue number (unique)."}
      - {name: Pipe, tf: pipe, json: pipe, type: selectmap, required: true, desc: "UUID of the parent pipe."}
      - {name: Weight, tf: weight, json: weight, type: int, required: true, desc: "Queue weight (1-100)."}
      - {name: Mask, tf: mask, json: mask, type: selectmap, default: "none", desc: "Dynamic queue mask: none, src-ip, dst-ip."}
      - {name: Description, tf: description, json: description, type: string, default: "", desc: "Description."}

  - name: rule
    go_type: Rule
    type_name: trafficshaper_rule
    title: a traffic shaper rule
    kind: item
    reconfigure: /api/trafficshaper/service/reconfigure
    monad: rule
    endpoints:
      add: /api/trafficshaper/settings/add_rule
      get: /api/trafficshaper/settings/get_rule
      set: /api/trafficshaper/settings/set_rule
      del: /api/trafficshaper/settings/del_rule
      search: /api/trafficshaper/settings/search_rule
    fields:
      - {name: Enabled, tf: enabled, json: enabled, type: bool, default: "true", desc: "Whether this rule is enabled."}
      - {name: Sequence, tf: sequence, json: sequence, type: int, required: true, desc: "Rule evaluation order."}
      - {name: Interface, tf: interface, json: interface, type: selectmap, required: true, desc: "Interface to match."}
      - {name: Protocol, tf: protocol, json: proto, type: selectmap, required: true, desc: "Protocol to match (e.g. ip, tcp, udp)."}
      - {name: Source, tf: source, json: source, type: string, default: "any", desc: "Source network/host."}
      - {name: SourceNot, tf: source_not, json: source_not, type: bool, default: "false", desc: "Invert the source match."}
      - {name: SourcePort, tf: source_port, json: src_port, type: string, default: "", desc: "Source port (empty = any)."}
      - {name: Destination, tf: destination, json: destination, type: string, default: "any", desc: "Destination network/host."}
      - {name: DestinationNot, tf: destination_not, json: destination_not, type: bool, default: "false", desc: "Invert the destination match."}
      - {name: DestinationPort, tf: destination_port, json: dst_port, type: string, default: "", desc: "Destination port (empty = any)."}
      - {name: Direction, tf: direction, json: direction, type: selectmap, default: "", desc: "Traffic direction (empty = both)."}
      - {name: Target, tf: target, json: target, type: selectmap, required: true, desc: "UUID of the target pipe or queue."}
      - {name: Description, tf: description, json: description, type: string, default: "", desc: "Description."}
